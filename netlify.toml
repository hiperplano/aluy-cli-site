# aluy-cli-site — static site (no build step). Publish the repo root as-is.
[build]
  publish = "."

# Serve the installers as text so `curl … | bash` / `irm … | iex` work and
# opening them in a browser shows the script instead of downloading a blob.
[[headers]]
  for = "/install.sh"
  [headers.values]
    Content-Type = "text/x-shellscript; charset=utf-8"

[[headers]]
  for = "/install.ps1"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/install.cmd"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
